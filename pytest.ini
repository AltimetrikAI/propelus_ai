[pytest]
# Pytest configuration for Propelus AI Taxonomy Framework

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum Python version
minversion = 3.9

# Add current directory to Python path
pythonpath = . lambdas services

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=lambdas
    --cov=services
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --maxfail=3
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests that run in isolation
    integration: Integration tests that require external dependencies
    slow: Tests that take more than 5 seconds to run
    smoke: Quick smoke tests for CI/CD
    database: Tests that require database connection
    aws: Tests that interact with AWS services
    api: API endpoint tests
    lambda: Lambda function tests
    mapping: Mapping engine tests
    translation: Translation service tests

# Coverage settings
[coverage:run]
source = lambdas,services
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*
    */fixtures/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

# Logging configuration for tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Capture settings
capture = no

# Asyncio mode for async tests
asyncio_mode = auto